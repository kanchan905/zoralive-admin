<div class="notification-modal">
  <div class="dialog-header">
    <h2 class="dialog-title">Notification</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="notif-one-title">Title</label>
      <input
        id="notif-one-title"
        type="text"
        class="form-control"
        formControlName="title"
        placeholder="Title"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="notif-one-description">Description</label>
      <input
        id="notif-one-description"
        type="text"
        class="form-control"
        formControlName="description"
        placeholder="Description"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="notif-one-image">Image</label>
      <div class="file-input-wrap">
        <input
          id="notif-one-image"
          type="file"
          class="file-input"
          accept="image/png,image/jpeg,image/jpg"
          (change)="onImageSelected($event)"
        />
        <span class="file-name">{{ selectedFileName() }}</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="notif-one-which-user">Which User</label>
      <app-select
        id="notif-one-which-user"
        formControlName="whichUser"
        placeholder="Select user"
        [options]="userOptions"
      />
    </div>

    <div class="dialog-footer">
      <app-button preset="send" type="submit" icon="bi bi-send">Send</app-button>
    </div>
  </form>
</div>
