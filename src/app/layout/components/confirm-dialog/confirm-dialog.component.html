<div class="confirm-dialog" [class]="'confirm-dialog--' + data.type">
  <div class="confirm-dialog__icon" aria-hidden="true">
    <i class="bi" [class]="iconClass"></i>
  </div>

  <h2 class="confirm-dialog__title">{{ data.title }}</h2>

  @if (data.message) {
    <p class="confirm-dialog__message">{{ data.message }}</p>
  }

  <div class="confirm-dialog__actions">
    @if (data.showCancel) {
      <app-button preset="cancel-card" type="button" (clicked)="cancel()">
        {{ data.cancelText }}
      </app-button>
    }

    <app-button
      [preset]="data.type === 'danger' ? 'delete' : 'primary'"
      type="button"
      (clicked)="confirm()"
    >
      {{ data.confirmText }}
    </app-button>
  </div>
</div>
