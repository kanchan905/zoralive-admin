<div class="notification-modal">
  <div class="dialog-header">
    <h2 class="dialog-title">Message to all users</h2>
    <button type="button" class="dialog-close" (click)="close()" aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="notif-two-message">Message</label>
      <input
        id="notif-two-message"
        type="text"
        class="form-control"
        formControlName="message"
        placeholder="message"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="notif-two-which-user">Which User</label>
      <select id="notif-two-which-user" class="form-control" formControlName="whichUser">
        @for (opt of userOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <div class="dialog-footer">
      <button type="submit" class="btn-send">
        <i class="bi bi-send"></i>
        Send
      </button>
    </div>
  </form>
</div>
