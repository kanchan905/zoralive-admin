<div class="notification-modal">
  <div class="dialog-header">
    <h2 class="dialog-title">Message to all users</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="notif-two-message">Message</label>
      <input
        id="notif-two-message"
        type="text"
        class="form-control"
        formControlName="message"
        placeholder="message"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="notif-two-which-user">Which User</label>
      <app-select
        id="notif-two-which-user"
        formControlName="whichUser"
        placeholder="Select user"
        [options]="userOptions"
      />
    </div>

    <div class="dialog-footer">
      <app-button preset="send" type="submit" icon="bi bi-send">Send</app-button>
    </div>
  </form>
</div>
