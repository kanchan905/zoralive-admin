<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Country</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="country-name">Name</label>
      <input
        id="country-name"
        type="text"
        class="form-control"
        formControlName="name"
        placeholder="Country Name"
      />
    </div>

    <app-button preset="submit-full" type="submit">Submit</app-button>
  </form>
</div>
