<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Solved Complain"
    subtitle="View all resolved host complaints."
  ></app-page-header>

  <div class="page-card">
    <div class="table-toolbar table-toolbar--search-end">
      <app-search-box
        placeholder="What're you searching for?"
        (searchChange)="onSearch($event)"
      ></app-search-box>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="No solved complaints found"
      emptyMessage="Try adjusting your search or check back later."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (rowLinkClick)="onViewDetail($event)"
    ></app-data-table>
  </div>
</div>
