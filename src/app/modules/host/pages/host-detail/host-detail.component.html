<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Host Detail"
    subtitle="Manage host performance and activity"
  ></app-page-header>

  <div class="page-card">
    <div class="host-filters-bar">
      <div class="host-filters-left">
        <div class="filter-field">
          <label class="filter-label" for="host-status">Status</label>
          <app-select
            id="host-status"
            triggerClass="filter-select"
            placeholder="Select status"
            [options]="statusOptions"
            [(ngModel)]="statusFilter"
          />
        </div>

        <div class="filter-field">
          <label class="filter-label" for="host-from-date">From Date</label>
          <app-date-picker id="host-from-date" [(ngModel)]="fromDate" />
        </div>

        <span class="filter-date-sep" aria-hidden="true">→</span>

        <div class="filter-field">
          <label class="filter-label" for="host-to-date">To Date</label>
          <app-date-picker id="host-to-date" [(ngModel)]="toDate" [min]="fromDate" />
        </div>

        <app-button preset="filter-apply" icon="bi bi-funnel" (clicked)="applyFilters()">
          Filter
        </app-button>
      </div>

      <app-button preset="export" icon="bi bi-download" (clicked)="exportToExcel()">
        Export To Excel
      </app-button>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      [pageSizeOptions]="pageSizeOptions"
      [stickyHeader]="true"
      [zebraRows]="true"
      rowTrackKey="id"
      emptyTitle="No Host Records Found"
      emptyMessage="Try changing filters or date range."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (rowAction)="onRowAction($event)"
    ></app-data-table>
  </div>
</div>
