<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header title="Profile" subtitle="Manage your account settings."></app-page-header>

  <div class="page-card profile-card">
    <img class="profile-avatar" [src]="avatarUrl" alt="Admin profile" />
    <div>
      <h2 class="profile-name">Admin</h2>
      <p class="profile-role">Super Admin</p>
    </div>
  </div>
</div>
