<div class="dashboard-page">
  <div class="dashboard-top">
    <div>
      <h1 class="page-title">Welcome back, Admin! 👋</h1>
      <p class="page-subtitle">Here's what's happening with your platform today.</p>
    </div>
    <button type="button" class="date-filter-btn">
      <i class="bi bi-calendar3"></i>
      <span>{{ dateRange }}</span>
      <i class="bi bi-chevron-down"></i>
    </button>
  </div>

  <div class="stats-grid">
    @for (card of statCards; track card.label) {
      <div class="stat-card" [attr.data-theme]="card.theme">
        <div class="stat-card-top">
          <div class="stat-icon">
            <i class="bi" [ngClass]="card.icon"></i>
          </div>
          <i class="bi bi-bar-chart stat-chart-icon"></i>
        </div>
        <p class="stat-value">{{ card.value | number }}</p>
        <p class="stat-label">{{ card.label }}</p>
        <div class="stat-wave"></div>
      </div>
    }
  </div>
</div>
