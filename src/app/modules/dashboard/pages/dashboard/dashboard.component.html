<div class="dashboard-page">
  <div class="dashboard-top">
    <div>
      <h1 class="page-title">{{ welcomeTitle() }}</h1>
      <p class="page-subtitle">{{ welcomeSubtitle() }}</p>
    </div>
    @if (!isAgency()) {
      <div class="dashboard-filters">
        <div class="filter-field">
          <label class="filter-label" for="dashboard-from-date">From Date</label>
          <app-date-picker id="dashboard-from-date" [(ngModel)]="fromDate" />
        </div>

        <span class="filter-date-sep" aria-hidden="true">→</span>

        <div class="filter-field">
          <label class="filter-label" for="dashboard-to-date">To Date</label>
          <app-date-picker id="dashboard-to-date" [(ngModel)]="toDate" [min]="fromDate" />
        </div>

        <app-button preset="filter-apply" icon="bi bi-funnel" (clicked)="applyFilters()">
          Filter
        </app-button>
      </div>
    }
  </div>

  <div class="stats-grid">
    @for (card of statCards(); track card.label) {
      <div class="stat-card" [attr.data-theme]="card.theme">
        <div class="stat-card-top">
          <div class="stat-icon">
            <i class="bi" [ngClass]="card.icon"></i>
          </div>
          <i class="bi bi-bar-chart stat-chart-icon"></i>
        </div>
        @if (hasCardValue(card)) {
          <p class="stat-value">{{ card.value | number }}</p>
        }
        <p class="stat-label">{{ card.label }}</p>
        <div class="stat-wave"></div>
      </div>
    }
  </div>
</div>
