<div class="agency-dialog">
  <div class="dialog-header">
    <div class="dialog-header-text">
      <div class="dialog-title-row">
        <span class="dialog-icon"><i class="bi bi-building"></i></span>
        <h2 class="dialog-title">Add New Agency</h2>
      </div>
      <p class="dialog-subtitle">Fill in the details below to create a new agency.</p>
    </div>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="agency-name">
        Name <span class="required">*</span>
      </label>
      <div class="input-wrap">
        <i class="bi bi-person input-icon"></i>
        <input
          id="agency-name"
          type="text"
          class="form-control"
          formControlName="name"
          placeholder="Enter agency name"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Image</label>
      <label class="upload-zone">
        <input type="file" accept="image/png,image/jpeg,image/jpg" hidden (change)="onImageSelected($event)" />
        @if (imagePreview()) {
          <img [src]="imagePreview()!" alt="Preview" class="upload-preview" />
        } @else {
          <i class="bi bi-image upload-icon"></i>
          <span class="upload-text">Click to upload</span>
          <span class="upload-hint">PNG, JPG (Max. 2MB)</span>
        }
      </label>
    </div>

    <div class="form-group">
      <label class="form-label" for="agency-country">
        Country <span class="required">*</span>
      </label>
      <div class="input-wrap">
        <i class="bi bi-globe2 input-icon"></i>
        <app-select
          id="agency-country"
          formControlName="country"
          placeholder="Select country"
          [options]="countries"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="agency-email">
        Email <span class="required">*</span>
      </label>
      <div class="input-wrap">
        <i class="bi bi-envelope input-icon"></i>
        <input
          id="agency-email"
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter email address"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="agency-mobile">
        Mobile No <span class="required">*</span>
      </label>
      <div class="input-wrap">
        <i class="bi bi-telephone input-icon"></i>
        <input
          id="agency-mobile"
          type="tel"
          class="form-control"
          formControlName="mobile"
          placeholder="Enter mobile number"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="agency-password">
        Password <span class="required">*</span>
      </label>
      <div class="input-with-action">
        <div class="input-wrap input-wrap--flex">
          <i class="bi bi-lock input-icon"></i>
          <input
            id="agency-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control"
            formControlName="password"
            placeholder="Enter password"
          />
          <button type="button" class="input-suffix-btn" (click)="togglePasswordVisibility()" aria-label="Toggle password">
            <i class="bi" [ngClass]="showPassword() ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <app-button preset="auto" icon="bi bi-magic" (clicked)="autoGeneratePassword()">
          Auto Generate
        </app-button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="agency-code">
        Agency Code <span class="required">*</span>
      </label>
      <div class="input-with-action">
        <div class="input-wrap input-wrap--flex">
          <i class="bi bi-hash input-icon"></i>
          <input
            id="agency-code"
            type="text"
            class="form-control"
            formControlName="code"
            placeholder="Enter agency code"
          />
        </div>
        <app-button preset="auto" icon="bi bi-magic" (clicked)="autoGenerateCode()">
          Auto Generate
        </app-button>
      </div>
    </div>

    <div class="dialog-footer">
      <app-button preset="cancel" (clicked)="close()">Cancel</app-button>
      <app-button preset="submit" type="submit" icon="bi bi-save">Submit</app-button>
    </div>
  </form>
</div>
