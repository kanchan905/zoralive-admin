<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Accepted Redeem"
    subtitle="Manage and view all accepted redeem requests."
  >
    <button actions type="button" class="btn-export" (click)="exportToExcel()">
      <i class="bi bi-download"></i>
      Export To Excel
    </button>
  </app-page-header>

  <div class="page-card">
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <button type="button" class="btn-filter-labeled" (click)="openFilter()">
          <i class="bi bi-funnel"></i>
          Filter
        </button>
      </div>

      <div class="table-toolbar-right">
        <app-search-box
          placeholder="Search by coin or description..."
          (searchChange)="onSearch($event)"
        ></app-search-box>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="No accepted redeem request found"
      emptyMessage="There are no accepted redeem requests to display."
      emptyActionLabel="Add New Redeem"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (emptyAction)="openAddRedeem()"
      (rowAction)="onRowAction($event)"
    ></app-data-table>
  </div>
</div>
