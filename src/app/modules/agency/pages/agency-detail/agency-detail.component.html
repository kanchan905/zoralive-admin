<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Agency Detail"
    subtitle="Manage and view all agencies in the platform."
  >
    <app-button actions preset="export" icon="bi bi-download" (clicked)="exportToExcel()">
      Export To Excel
    </app-button>
  </app-page-header>

  <div class="page-card">
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <app-button preset="primary" (clicked)="openAgencyModal()">
          <i class="bi bi-plus-lg"></i>
          New
        </app-button>
      </div>

      <div class="table-toolbar-right">
        <app-search-box
          placeholder="What're you searching for?"
          (searchChange)="onSearch($event)"
        ></app-search-box>
        <app-button preset="filter" icon="bi bi-funnel" ariaLabel="Filter" />
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="No Agencies Found"
      emptyMessage="No records available."
      emptyActionLabel="Add New Agency"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (emptyAction)="openAgencyModal()"
      (rowAction)="onRowAction($event)"
      (rowLinkClick)="onRowLink($event)"
      (rowToggleChange)="onToggleChange($event)"
    ></app-data-table>
  </div>
</div>
