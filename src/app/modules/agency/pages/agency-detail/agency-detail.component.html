<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Agency Detail"
    subtitle="Manage and view all agencies in the platform."
  >
    <button actions type="button" class="btn-export" (click)="exportToExcel()">
      <i class="bi bi-download"></i>
      Export To Excel
    </button>
  </app-page-header>

  <div class="page-card">
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <button type="button" class="btn-primary" (click)="openAgencyModal()">
          <i class="bi bi-plus-lg"></i>
          New
        </button>
      </div>

      <div class="table-toolbar-right">
        <app-search-box
          placeholder="What're you searching for?"
          (searchChange)="onSearch($event)"
        ></app-search-box>
        <button type="button" class="btn-filter" aria-label="Filter">
          <i class="bi bi-funnel"></i>
        </button>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="No Agencies Found"
      emptyMessage="No records available."
      emptyActionLabel="Add New Agency"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (emptyAction)="openAgencyModal()"
      (rowAction)="onRowAction($event)"
      (rowLinkClick)="onRowLink($event)"
      (rowToggleChange)="onToggleChange($event)"
    ></app-data-table>
  </div>
</div>
