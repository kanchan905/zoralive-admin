<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Offline History"
    subtitle="Track offline coin recharge records."
  ></app-page-header>

  <div class="page-card">
    <div class="table-toolbar table-toolbar--search-end">
      <app-search-box
        placeholder="Search by name or username..."
        (searchChange)="onSearch($event)"
      ></app-search-box>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="Nothing to show!!"
      emptyMessage="No offline recharge history found."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    ></app-data-table>
  </div>
</div>
