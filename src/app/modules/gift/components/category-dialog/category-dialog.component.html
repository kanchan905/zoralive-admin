<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Category</h2>
    <button type="button" class="dialog-close" (click)="close()" aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="category-name">Name</label>
      <input
        id="category-name"
        type="text"
        class="form-control"
        formControlName="name"
        placeholder="Category Name"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="category-image">Image</label>
      <div class="file-input-wrap">
        <input
          id="category-image"
          type="file"
          class="file-input"
          accept="image/*"
          (change)="onImageSelected($event)"
        />
        <span class="file-name">{{ imageName() }}</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label checkbox-inline">
        <input type="checkbox" formControlName="isTop" />
        Is Top
      </label>
    </div>

    <button type="submit" class="btn-submit-full">Submit</button>
  </form>
</div>
