<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Gift</h2>
    <button type="button" class="dialog-close" (click)="close()" aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="gift-icon">Icon</label>
      <div class="file-input-wrap">
        <input
          id="gift-icon"
          type="file"
          class="file-input"
          accept="image/*"
          (change)="onIconSelected($event)"
        />
        <span class="file-name">{{ iconName() }}</span>
      </div>
    </div>

    <div class="form-row form-row--2">
      <div class="form-group">
        <label class="form-label" for="gift-coin">Coin</label>
        <input
          id="gift-coin"
          type="number"
          min="0"
          class="form-control"
          formControlName="coin"
          placeholder="0"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="gift-category">Category</label>
        <select id="gift-category" class="form-control" formControlName="categoryId">
          @for (opt of categoryOptions; track opt.value) {
            <option [value]="opt.value" [disabled]="!opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
    </div>

    <button type="submit" class="btn-submit-full">Submit</button>
  </form>
</div>
