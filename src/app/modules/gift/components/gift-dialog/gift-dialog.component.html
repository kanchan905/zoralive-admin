<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Gift</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="gift-icon">Icon</label>
      <div class="file-input-wrap">
        <input
          id="gift-icon"
          type="file"
          class="file-input"
          accept="image/*"
          (change)="onIconSelected($event)"
        />
        <span class="file-name">{{ iconName() }}</span>
      </div>
    </div>

    <div class="form-row form-row--2">
      <div class="form-group">
        <label class="form-label" for="gift-coin">Coin</label>
        <input
          id="gift-coin"
          type="number"
          min="0"
          class="form-control"
          formControlName="coin"
          placeholder="0"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="gift-category">Category</label>
        <app-select
          id="gift-category"
          formControlName="categoryId"
          placeholder="Select category"
          [options]="categoryOptions"
        />
      </div>
    </div>

    <app-button preset="submit-full" type="submit">Submit</app-button>
  </form>
</div>
