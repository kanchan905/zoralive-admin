<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header title="VIP Plan" subtitle="Manage VIP plan configuration."></app-page-header>

  <div class="page-card vip-plan-card">
    <div class="vip-plan-actions-top">
      <app-button preset="new" icon="bi bi-plus-lg" (clicked)="openNew()">New</app-button>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="Nothing to show!!"
      emptyMessage="No VIP plans found."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (rowToggleChange)="onRowToggle($event)"
      (rowAction)="onRowAction($event)"
    ></app-data-table>
  </div>
</div>
