<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Purchase Plan</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-row form-row--2">
      <div class="form-group">
        <label class="form-label" for="purchase-plan-coin">Coin</label>
        <input
          id="purchase-plan-coin"
          type="number"
          min="0"
          class="form-control"
          formControlName="coin"
          placeholder="0"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="purchase-plan-rupee">Rupee</label>
        <input
          id="purchase-plan-rupee"
          type="number"
          min="0"
          class="form-control"
          formControlName="rupee"
          placeholder="0"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="purchase-plan-product-id">Product Id</label>
      <input
        id="purchase-plan-product-id"
        type="text"
        class="form-control"
        formControlName="productId"
        placeholder="Enter Product Id"
      />
    </div>

    <app-button preset="submit-full" type="submit">Submit</app-button>
  </form>
</div>
