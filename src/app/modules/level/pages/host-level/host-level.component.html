<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Host Level"
    subtitle="Manage host levels and coin criteria."
  ></app-page-header>

  <div class="page-card">
    <div class="table-toolbar">
      <div class="table-toolbar-left">
        <app-button preset="new" icon="bi bi-plus-lg" (clicked)="openNewLevel()">New</app-button>
      </div>

      <div class="table-toolbar-right">
        <app-search-box
          placeholder="What're you searching for?"
          (searchChange)="onSearch($event)"
        ></app-search-box>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="Nothing to show!!"
      emptyMessage="No host levels found."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (rowAction)="onRowAction($event)"
    ></app-data-table>
  </div>
</div>
