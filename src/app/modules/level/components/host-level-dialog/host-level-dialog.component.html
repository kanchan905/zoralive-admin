<div class="agency-dialog">
  <div class="dialog-header">
    <h2 class="dialog-title">Host Level</h2>
    <app-button preset="close" icon="bi bi-x-lg" ariaLabel="Close" (clicked)="close()" />
  </div>

  <form class="dialog-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label class="form-label" for="host-level-name">Name</label>
      <input
        id="host-level-name"
        type="text"
        class="form-control"
        formControlName="name"
        placeholder="Level Name"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="host-level-coin">Coin</label>
      <input
        id="host-level-coin"
        type="number"
        min="0"
        step="1"
        class="form-control"
        formControlName="coin"
        placeholder="0"
      />
    </div>

    <app-button preset="submit-full" type="submit">Submit</app-button>
  </form>
</div>
