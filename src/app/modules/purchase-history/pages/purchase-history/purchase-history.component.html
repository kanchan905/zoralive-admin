<div class="page-container">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>

  <app-page-header
    title="Purchase Coin History"
    subtitle="Track coin purchases with date-wise filtering."
  ></app-page-header>

  <div class="page-card purchase-history-card">
    <div class="purchase-history-filters-bar">
      <div class="purchase-history-filters-left">
        <div class="filter-field">
          <label class="filter-label" for="purchase-history-from">From Date</label>
          <app-date-picker
            id="purchase-history-from"
            [ngModel]="fromDate()"
            (ngModelChange)="onFromDateChange($event)"
          />
        </div>

        <span class="filter-date-sep" aria-hidden="true">→</span>

        <div class="filter-field">
          <label class="filter-label" for="purchase-history-to">To Date</label>
          <app-date-picker
            id="purchase-history-to"
            [ngModel]="toDate()"
            (ngModelChange)="onToDateChange($event)"
            [min]="fromDate()"
          />
        </div>

        <app-button preset="filter-apply" icon="bi bi-funnel" (clicked)="applyDateFilters()">
          Filter
        </app-button>
      </div>

      <div class="search-wrap">
        <app-search-box
          placeholder="What're you searching for?"
          (searchChange)="onSearch($event)"
        ></app-search-box>
      </div>
    </div>

    <app-data-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [page]="page()"
      [pageSize]="pageSize()"
      [total]="total()"
      rowTrackKey="id"
      emptyTitle="Nothing to show!!"
      emptyMessage="No purchase history found."
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    ></app-data-table>
  </div>
</div>
